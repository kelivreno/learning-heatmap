<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>Learning Map</title>
        <link rel="stylesheet" href="styles.css">
        <script src="https://cdn.anychart.com/releases/8.11.0/js/anychart-core.min.js"></script>
        <script src="https://cdn.anychart.com/releases/8.11.0/js/anychart-calendar.min.js"></script>
    </head>

    <body>
        <div id="hero">
            <h1>My Learning Map</h1>
            <p>This project is inspired by GitHub's bution chart, I liked seeing the visualization that 
               the chart has and I wanted to apply something like that for my learning. I wanted to see if it also helps me. 
            </p>
            <div id="heatmap"></div>
            <div id="controls">
                <input id="input-minutes" placeholder="Input study minutes" type="number" min="1">
            <button>Commit</button>
        </div> 
        <script src="script.js"></script>
    </body>
</html>
